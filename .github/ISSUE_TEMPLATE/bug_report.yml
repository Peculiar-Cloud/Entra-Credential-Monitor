name: Bug Report
description: Report a reproducible problem with scanning, reporting, or deployment.
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include tenant IDs, client IDs, client secrets, Resend API keys, recipient lists, Healthchecks URLs, or private tenant names.
  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag, image tag, or commit SHA.
      placeholder: v2.1.0
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Node CLI
        - Docker image
        - GitHub Actions
        - Forgejo Actions
        - Other scheduler
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, pnpm version, scheduler, container runtime, and relevant non-secret config.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Redact all identifiers and secrets before pasting.
      render: shell
