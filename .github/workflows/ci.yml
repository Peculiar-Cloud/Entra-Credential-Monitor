name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          corepack enable
          corepack prepare pnpm@11.5.1 --activate
          pnpm install --frozen-lockfile

      - name: Verify
        env:
          # Unit tests intentionally exercise the GitHub Actions log helpers.
          # Keep the raw output visible, but do not let test fixtures create
          # misleading annotations on a successful CI run.
          ENTRA_DISABLE_GITHUB_ACTIONS_COMMANDS: "true"
        run: pnpm verify
